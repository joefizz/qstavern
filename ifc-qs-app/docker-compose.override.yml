services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - uploads:/app/uploads
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --timeout-graceful-shutdown 2
    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:5173"
    command: npm run dev -- --host

volumes:
  uploads:
